name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Tag, publish, release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Read crate version
        id: version
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name == "postcrate-core") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected postcrate-core version: $VERSION"

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists. Nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist. Will release."
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Publish to crates.io
        if: steps.tag_check.outputs.exists == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p postcrate-core

      - name: Create GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Build release notes: GitHub's auto-generated changelog + a crates.io footer
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -f tag_name="$TAG" \
            -f target_commitish=main \
            "repos/${{ github.repository }}/releases/generate-notes" \
            --jq .body > /tmp/release-notes.md

          {
            echo ""
            echo "---"
            echo ""
            echo "**Published**: [\`postcrate-core $VERSION\` on crates.io](https://crates.io/crates/postcrate-core/$VERSION) — [docs.rs](https://docs.rs/postcrate-core/$VERSION)"
          } >> /tmp/release-notes.md

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md
